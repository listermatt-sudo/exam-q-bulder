<!DOCTYPE html>
<html>
<head>
    <title>Worksheet Builder</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        .container {
            width: 750px;
            margin: auto;
            margin-top: 50px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .row {
            display: flex;
            gap: 10px;
            width: fit-content;
            margin: 5px auto;
            align-items: center;
        }

        .row.dragging {
            background: #e8f0fe;
        }

        .header-row {
            display: flex;
            gap: 10px;
            width: fit-content;
            margin: 10px auto;
            font-weight: bold;
        }

        .header-cell {
            width: 150px;
            text-align: left;
        }

        select {
            width: 150px;
            padding: 8px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #005a9e;
        }

        .delete-btn {
            background: #d83b01;
        }

        .delete-btn:hover {
            background: #a4262c;
        }

        .drag-handle {
            cursor: grab;
            font-size: 18px;
        }

        #loginBox {
            margin-top: 120px;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Worksheet Builder Login</h2>
    <input type="password" id="password" placeholder="Enter password">
    <br><br>
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="container" id="app" style="display:none;">
    <h1>Worksheet Builder</h1>

    <div class="header-row">
        <div></div>
        <div class="header-cell">Month</div>
        <div class="header-cell">Paper</div>
        <div class="header-cell">Question</div>
        <div></div>
    </div>

    <div id="rows">Loading...</div>

    <button onclick="addRow()">Add Row</button>
<button onclick="generate()">Generate</button>

<hr style="margin: 40px 0; width: 60%;">

<div>
    <label><input type="radio" name="type" value="word" checked> Word</label>
    <label><input type="radio" name="type" value="pdf"> PDF</label>
</div>

<script>

function login() {
    const pw = document.getElementById("password").value;

    if (pw === "maths123") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("app").style.display = "block";
        loadStructure();
    } else {
        alert("Incorrect password");
    }
}

let structure = {};

async function loadStructure() {
    try {
        const res = await fetch("/structure");
        structure = await res.json();

        document.getElementById("rows").innerHTML = "";

        const loaded = loadFromURL();

        if (!loaded) addRow();

    } catch (err) {
        document.getElementById("rows").innerHTML = "Failed to load data.";
    }
}


// ✅ LOAD FROM EXCEL (NO DUPLICATES)
function loadFromURL() {

    const params = new URLSearchParams(window.location.search);
    const data = params.get("data");

    if (!data) return false;

    const seen = new Set();

    data.split(";").forEach(entry => {

        if (!entry) return;

        let [monthYear, paper, q] = entry.split("|");

        if (!monthYear || !paper || !q) return;

        if (monthYear.startsWith("Nov ")) {
            monthYear = monthYear.replace("Nov", "November");
        }

        const key = `${monthYear}|${paper}|${q}`;
        if (seen.has(key)) return;

        seen.add(key);

        addRowFromData(monthYear.trim(), paper.trim(), parseInt(q));
    });

    return true;
}


// ✅ ADD ROW
function addRow() {
    const div = createRow();
    document.getElementById("rows").appendChild(div);
    populateRow(div);
}


// ✅ CREATE ROW TEMPLATE
function createRow() {

    const div = document.createElement("div");
    div.className = "row";
    div.draggable = true;

    div.innerHTML = `
        <span class="drag-handle">☰</span>
        <select class="month"></select>
        <select class="paper"></select>
        <select class="question"></select>
        <button class="delete-btn">X</button>
    `;

    // ✅ Delete button
    div.querySelector(".delete-btn").onclick = () => div.remove();

    // ✅ Drag events
    div.addEventListener("dragstart", () => {
        div.classList.add("dragging");
    });

    div.addEventListener("dragend", () => {
        div.classList.remove("dragging");
    });

    return div;
}


// ✅ POPULATE ROW
function populateRow(div) {

    const monthSelect = div.querySelector(".month");
    const paperSelect = div.querySelector(".paper");
    const questionSelect = div.querySelector(".question");

    const months = Object.keys(structure).sort();
    monthSelect.innerHTML = months.map(m => `<option>${m}</option>`).join("");

    function updatePapers() {
        const m = monthSelect.value;
        let papers = Object.keys(structure[m] || {});

        const order = ["1F","2F","3F","1H","2H","3H"];
        papers.sort((a,b)=> order.indexOf(a)-order.indexOf(b));

        paperSelect.innerHTML = papers.map(p => `<option>${p}</option>`).join("");
        updateQuestions();
    }

    function updateQuestions() {
        const qlist = structure[monthSelect.value]?.[paperSelect.value] || [];
        questionSelect.innerHTML = qlist.map(q => `<option>Q${q}</option>`).join("");
    }

    monthSelect.addEventListener("change", updatePapers);
    paperSelect.addEventListener("change", updateQuestions);

    updatePapers();
}


// ✅ ADD ROW FROM EXCEL
function addRowFromData(monthYear, paper, q) {

    const div = createRow();
    document.getElementById("rows").appendChild(div);

    const monthSelect = div.querySelector(".month");
    const paperSelect = div.querySelector(".paper");
    const questionSelect = div.querySelector(".question");

    const months = Object.keys(structure).sort();
    monthSelect.innerHTML = months.map(m => `<option>${m}</option>`).join("");

    monthSelect.value = monthYear;

    function updatePapers() {
        let papers = Object.keys(structure[monthYear] || {});
        const order = ["1F","2F","3F","1H","2H","3H"];
        papers.sort((a,b)=> order.indexOf(a)-order.indexOf(b));

        paperSelect.innerHTML = papers.map(p => `<option>${p}</option>`).join("");
        paperSelect.value = paper;

        updateQuestions();
    }

    function updateQuestions() {
        const qlist = structure[monthYear]?.[paper] || [];
        questionSelect.innerHTML = qlist.map(x => `<option>Q${x}</option>`).join("");
        questionSelect.value = "Q"+q;
    }

    updatePapers();
}


// ✅ DRAG + DROP LOGIC
const container = document.getElementById("rows");

container.addEventListener("dragover", e => {
    e.preventDefault();
    const afterElement = getDragAfterElement(container, e.clientY);
    const dragging = document.querySelector(".dragging");

    if (!dragging) return;

    if (afterElement == null) {
        container.appendChild(dragging);
    } else {
        container.insertBefore(dragging, afterElement);
    }
});

function getDragAfterElement(container, y) {
    const elements = [...container.querySelectorAll(".row:not(.dragging)")];

    return elements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height/2;

        if (offset < 0 && offset > closest.offset) {
            return {offset, element: child};
        } else {
            return closest;
        }
    }, {offset: Number.NEGATIVE_INFINITY}).element;
}


// ✅ GENERATE
async function generate() {

    const rows = document.querySelectorAll("#rows .row");
    let entries = [];

    rows.forEach(row => {
        const monthYear = row.querySelector(".month").value;
        const paper = row.querySelector(".paper").value;
        const q = row.querySelector(".question").value.replace("Q","");

        const parts = monthYear.split(" ");
        const paperName = `${parts[0]} ${parts[1]} ${paper}`;

        entries.push([paperName, parseInt(q)]);
    });

    const type = document.querySelector('input[name="type"]:checked').value;

    const response = await fetch("/generate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({entries: entries, filetype: type})
    });

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);

    let filename = prompt("Enter file name:", "Skills Map Exam Practice");
    if (!filename) filename = "Skills Map Exam Practice";

    const ext = type === "word" ? ".docx" : ".pdf";

    const a = document.createElement("a");
    a.href = url;
    a.download = filename + ext;
    a.click();
}

</script>

</body>
</html>
