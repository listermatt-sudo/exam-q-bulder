<!DOCTYPE html>
<html>
<head>
    <title>Skills Map Exam Practice Builder</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        .container {
            width: 700px;
            margin: auto;
            margin-top: 50px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        /* ✅ Centre rows properly */
        .row {
            display: flex;
            gap: 10px;
            width: fit-content;
            margin: 5px auto;
        }

        /* ✅ Centre headers */
        .header-row {
            display: flex;
            gap: 10px;
            width: fit-content;
            margin: 10px auto;
            font-weight: bold;
        }

        .header-cell {
            width: 150px;
            text-align: left;
        }

        select {
            width: 150px;
            padding: 8px;
        }

        button {
            padding: 10px 15px;
            margin: 10px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #005a9e;
        }

        #loginBox {
            margin-top: 120px;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Skills Map Exam Practice Builder Login</h2>
    <input type="password" id="password" placeholder="Enter password">
    <br><br>
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="container" id="app" style="display:none;">
    <h1>Skills Map Exam Practice Builder</h1>

    <div class="header-row">
        <div class="header-cell">Series</div>
        <div class="header-cell">Paper</div>
        <div class="header-cell">Question</div>
    </div>

    <div id="rows">Loading...</div>

    <button onclick="addRow()">Add Row</button>
    <button onclick="generate()">Generate</button>

    <br><br>

    <label><input type="radio" name="type" value="word" checked> Word</label>
    <label><input type="radio" name="type" value="pdf"> PDF</label>
</div>

<script>

// ✅ Login
function login() {
    const pw = document.getElementById("password").value;

    if (pw === "maths123") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("app").style.display = "block";
        loadStructure();
    } else {
        alert("Incorrect password");
    }
}

let structure = {};

// ✅ Load structure + Excel data
async function loadStructure() {
    try {
        const res = await fetch("/structure");
        structure = await res.json();

        document.getElementById("rows").innerHTML = "";

        const loaded = loadFromURL();

        if (!loaded) {
            addRow();
        }

    } catch (err) {
        document.getElementById("rows").innerHTML = "Failed to load data.";
        console.error(err);
    }
}


// ✅ ✅ LOAD FROM EXCEL (NO DUPLICATES)
function loadFromURL() {

    const params = new URLSearchParams(window.location.search);
    const data = params.get("data");

    if (!data) return false;

    const entries = data.split(";");

    const seen = new Set(); // ✅ prevents duplicates

    entries.forEach(entry => {

        if (!entry) return;

        let [monthYear, paper, q] = entry.split("|");

        if (!monthYear || !paper || !q) return;

        if (monthYear.startsWith("Nov ")) {
            monthYear = monthYear.replace("Nov", "November");
        }

        monthYear = monthYear.trim();
        paper = paper.trim();
        q = parseInt(q);

        const key = `${monthYear}|${paper}|${q}`;

        if (seen.has(key)) return;  // ✅ skip duplicate

        seen.add(key);

        addRowFromData(monthYear, paper, q);
    });

    return true;
}


// ✅ Add blank row
function addRow() {

    const div = document.createElement("div");
    div.className = "row";

    div.innerHTML = `
        <select class="month"></select>
        <select class="paper"></select>
        <select class="question"></select>
    `;

    document.getElementById("rows").appendChild(div);

    populateRow(div);
}


// ✅ Populate dropdown row
function populateRow(div) {

    const monthSelect = div.querySelector(".month");
    const paperSelect = div.querySelector(".paper");
    const questionSelect = div.querySelector(".question");

    const months = Object.keys(structure).sort();
    monthSelect.innerHTML = months.map(m => `<option>${m}</option>`).join("");

    function updatePapers() {
        const selectedMonth = monthSelect.value;

        let papers = Object.keys(structure[selectedMonth] || {});
        const order = ["1F","2F","3F","1H","2H","3H"];
        papers.sort((a,b)=> order.indexOf(a)-order.indexOf(b));

        paperSelect.innerHTML = papers.map(p => `<option>${p}</option>`).join("");
        updateQuestions();
    }

    function updateQuestions() {
        const selectedMonth = monthSelect.value;
        const selectedPaper = paperSelect.value;

        const questions = structure[selectedMonth]?.[selectedPaper] || [];

        questionSelect.innerHTML =
            questions.map(q => `<option>Q${q}</option>`).join("");
    }

    monthSelect.addEventListener("change", updatePapers);
    paperSelect.addEventListener("change", updateQuestions);

    updatePapers();
}


// ✅ Add row from Excel
function addRowFromData(monthYear, paper, q) {

    const div = document.createElement("div");
    div.className = "row";

    div.innerHTML = `
        <select class="month"></select>
        <select class="paper"></select>
        <select class="question"></select>
    `;

    document.getElementById("rows").appendChild(div);

    const monthSelect = div.querySelector(".month");
    const paperSelect = div.querySelector(".paper");
    const questionSelect = div.querySelector(".question");

    const months = Object.keys(structure).sort();
    monthSelect.innerHTML = months.map(m => `<option>${m}</option>`).join("");

    monthSelect.value = monthYear;

    function updatePapers() {
        let papers = Object.keys(structure[monthYear] || {});

        const order = ["1F","2F","3F","1H","2H","3H"];
        papers.sort((a,b)=> order.indexOf(a)-order.indexOf(b));

        paperSelect.innerHTML = papers.map(p => `<option>${p}</option>`).join("");
        paperSelect.value = paper;

        updateQuestions();
    }

    function updateQuestions() {
        const questions = structure[monthYear]?.[paper] || [];

        questionSelect.innerHTML =
            questions.map(qv => `<option>Q${qv}</option>`).join("");

        questionSelect.value = "Q" + q;
    }

    updatePapers();
}


// ✅ Generate Skills Map Exam Practice
async function generate() {

    const rows = document.querySelectorAll("#rows .row");
    let entries = [];

    rows.forEach(row => {

        const monthYear = row.querySelector(".month").value;
        const paper = row.querySelector(".paper").value;
        const q = row.querySelector(".question").value.replace("Q", "");

        const parts = monthYear.split(" ");
        const paperName = `${parts[0]} ${parts[1]} ${paper}`;

        entries.push([paperName, parseInt(q)]);
    });

    const type = document.querySelector('input[name="type"]:checked').value;

    try {
        const response = await fetch("/generate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({entries: entries, filetype: type})
        });

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        let filename = prompt(
            "Enter file name:",
            "Skills Map Exam Practice"
        );

        if (!filename) filename = "Exam Practice";

        const ext = type === "word" ? ".docx" : ".pdf";

        const a = document.createElement("a");
        a.href = url;
        a.download = filename + ext;
        a.click();

    } catch (err) {
        alert("Error generating file");
        console.error(err);
    }
}

</script>

</body>
</html>
